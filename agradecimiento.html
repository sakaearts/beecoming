<html lang="es">
<head>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        titulo: ['DynaPuff', 'cursive'],
                        cozy: ['Comfortaa', 'sans-serif'],
                    },
                    colors: {
                        abeja: {
                            crema: '#FFF8EE',    // Amarillo naranjoso pastel
                            pastel: '#FCE3A1',   // Amarillo suave colmena
                            durazno: '#F4C18E',  // Durazno tierno
                            oro: '#F9A620',      // Oro miel
                            naranja: '#FF9200',  // Naranja brillante
                            ambar: '#D07C00',    // Ámbar profundo
                            texto: '#543D2B',    // Café suave cozy
                        },
                    },
                    animation: {
                        'cozy-bounce': 'cozyBounce 3s ease-in-out infinite',
                    },
                    keyframes: {
                        cozyBounce: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        }
                    }
                },
            },
        }
    </script>

    <style>
        body{
            font-family: 'Comfortaa', sans-serif;
            background-color: #FFF8EE;
            color: #543D2B;
        }

        .font-somelist {
            font-family: 'DynaPuff', cursive;
            letter-spacing: -0.01em;
        }

        /* Animación para las partículas de polen extra grandes y notorias */
        @keyframes floatPolen {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-220px) translateX(45px) rotate(240deg); opacity: 0; }
        }
        .polen-particle {
            position: absolute;
            background: radial-gradient(circle, #FF9200 0%, rgba(249, 166, 32, 0.8) 70%, rgba(252, 227, 161, 0) 100%);
            border-radius: 50%;
            pointer-events: none;
            filter: drop-shadow(0 0 6px rgba(255, 146, 0, 0.6));
            animation: floatPolen 9s infinite ease-in-out;
        }
    </style>
</head>
<body class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center overflow-hidden">
    <script>
          fbq('track', 'ViewContent');
    </script>

    <!-- Polen flotante decorativo de agradecimiento -->
    <div id="particleContainerAgradecimiento" class="absolute inset-0 pointer-events-none z-10"></div>
    
    <div class="max-w-2xl space-y-6 relative z-20 flex flex-col items-center">
        <!-- LOGO HORIZONTAL GIGANTE Y ANCHO (SIN RESTRICCIÓN CUADRADA) -->
        <img src="img/Logo Bee horizontal.png" alt="Abejita" class="w-72 md:w-[28rem] h-auto object-contain animate-cozy-bounce mb-2" onerror="this.onerror=null; this.src='Logo Bee horizontal.png';">

        <h1 class="font-somelist text-4xl md:text-6xl text-abeja-texto leading-tight">
            ¡Ahora eres parte de la colmena!
        </h1>
        <p class="text-lg text-abeja-ambar font-semibold">
            Tu voto ha sido registrado con éxito. ¡En serio muchísimas gracias por apoyar mi proyecto!
        </p>

        <!-- ESPACIO DE ANIMACIÓN TOTALMENTE RECALIBRADO: JONI BOBO COMPLETA, CENTRADA, SIN CORTES Y GIGANTE -->
        <div class="w-64 h-64 md:w-80 md:h-80 relative flex items-center justify-center overflow-hidden select-none">
            <img src="img/Animacion.gif" alt="Joni Bobo Animación" class="w-full h-full object-contain transform scale-150 mix-blend-multiply animate-cozy-bounce" onerror="this.onerror=null; this.src='Animacion.gif';">
        </div>

        <button onclick="volverAColmena()" class="bg-abeja-naranja hover:bg-abeja-oro text-white font-somelist font-bold py-4 px-10 rounded-full text-lg shadow-md transition-all hover:scale-105 active:scale-95 mt-4">
            Volver a la colmena 🏠
        </button>
    </div>

    <script>
        const containerAgradecimiento = document.getElementById('particleContainerAgradecimiento');
        function crearParticulaAgradecimiento(isInitial = false) {
            if (!containerAgradecimiento) return;
            const particle = document.createElement('div');
            particle.classList.add('polen-particle');
            
            const size = Math.random() * 16 + 14; // Polen grande
            const left = Math.random() * 100;
            const duration = Math.random() * 6 + 5;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.bottom = `-30px`;
            particle.style.animationDuration = `${duration}s`;

            if (isInitial) {
                const randomProgress = Math.random() * duration;
                particle.style.animationDelay = `-${randomProgress}s`;
            } else {
                const delay = Math.random() * 1.5;
                particle.style.animationDelay = `${delay}s`;
            }

            containerAgradecimiento.appendChild(particle);

            const delayOffset = isInitial ? 0 : parseFloat(particle.style.animationDelay);
            setTimeout(() => {
                particle.remove();
            }, (duration + delayOffset) * 1000);
        }

        for (let i = 0; i < 18; i++) {
            crearParticulaAgradecimiento(true);
        }

        setInterval(() => crearParticulaAgradecimiento(false), 180);

        function volverAColmena() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
